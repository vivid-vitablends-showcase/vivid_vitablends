name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: vividvitablendsdev/vividvitablends

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:backend-latest
            ${{ env.IMAGE_NAME }}:backend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:backend-latest
          cache-to: type=inline

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:frontend-latest
            ${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:frontend-latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script_stop: true
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,DATABASE_URL,DIRECT_URL,JWT_SECRET,POSTGRES_PASSWORD
          script: |
            if [ ! -d "/opt/vivid_vitablends" ]; then
              sudo mkdir -p /opt/vivid_vitablends
              sudo chown $USER:$USER /opt/vivid_vitablends
              cd /opt/vivid_vitablends
              git clone https://github.com/${{ github.repository }} .
            else
              cd /opt/vivid_vitablends
              git fetch origin
              git reset --hard origin/main
            fi

            echo "Creating production env file..."
            cat > .env <<EOF
            DATABASE_URL=${DATABASE_URL}
            DIRECT_URL=${DIRECT_URL}
            JWT_SECRET=${JWT_SECRET}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            EOF

            chmod +x deploy.sh
            ./deploy.sh

      - name: Health Check
        run: |
          echo "Waiting for app..."
          sleep 60
          curl --retry 5 --retry-delay 10 --fail http://${{ secrets.VM_HOST }}:8000/api/health
